# Production Environment Config Example
# File location: .kumpeapps-deploy-bot/prod/myapp.yml

deployment_type: docker
assigned_username: justinkumpe
vm_hostname: prod-vm-incarceration-bot

# Optional: VM user management
# Users will be created on the VM and added to bot-admin group
# Smart groups:
#   - github.repo.collaborators (all repo collaborators)
#   - github.repo.admins (repo admins only)
#   - github.org.team.TEAM_SLUG (org team members - uses repo owner as org)
#   - github.org.ORG_NAME.team.TEAM_SLUG (specific org team)
# Note: Organization team smart groups require GitHub App to have
# "Organization: Members" read permission. Without this permission,
# team expansion will fail and you should use individual usernames instead.
authorized_admins:
  - github.repo.admins
  - github.org.kumpeapps.team.vm-admins

# Domains for reverse proxy
domains:
  - incarcerationbot.kumpe.app
  - incarcerationbotapi.kumpe.app

# Docker Compose - reference file in same directory
# Note: Managed Nebula VPN client is automatically injected as the first service
# You don't need to include it in your docker-compose.yml
docker_compose: docker-compose.yml

# Inline example:
# docker_compose: |
#   version: '3.8'
#   services:
#     web:
#       image: myapp:latest
#       ports:
#         - "8080:8080"
#       environment:
#         NODE_ENV: production
#         LOG_LEVEL: warn
#       restart: unless-stopped

# Caddy configuration
# Place a file named 'caddyfile' in the same directory as this config file
# The caddyfile will be deployed as: {owner}-{repo}-{env}.caddy
# Example: 'kumpeapps-myapp-prod.caddy'
#
# All domains in the caddyfile must be:
#   1. Declared in the 'domains' list above
#   2. In your authorized domains list
#
# caddyfile example:
# {{DOMAIN}} {
#   import ssl_defaults
#   reverse_proxy {{nebula.ip}}:8080
# }
#
# Available placeholders:
#   {{vm.ip}} - VM IP address
#   {{nebula.ip}} - Nebula VPN IP (from PROD_NEBULA_IP secret)

# Environment variable mappings
# Map container env vars to GitHub repository secrets
env_mappings:
  # VPN configuration (required for automatic VPN client injection)
  NEBULA_CLIENT_TOKEN: PROD_NEBULA_CLIENT_TOKEN
  
  # Database configuration
  DB_HOST: DB_HOST
  DB_NAME: DB_NAME
  DB_PASSWORD: DB_PASSWORD
  DB_PORT: DB_PORT
  DB_TYPE: DB_TYPE
  DB_USER: DB_USER
  
  # Application configuration
  API_BASE_URL: API_BASE_URL
  APP_TITLE: APP_TITLE
  ENABLE_JAILS_CONTAINING: ENABLE_JAILS_CONTAINING
  EXTERNAL_USER_MANAGEMENT: EXTERNAL_USER_MANAGEMENT
  FETCH_MUGSHOTS: FETCH_MUGSHOTS
  LOG_FILE: LOG_FILE
  MUGSHOT_TIMEOUT: MUGSHOT_TIMEOUT
  TZ: TZ
  
  # Security and API keys
  JWT_SECRET_KEY: JWT_SECRET_KEY
  MASTER_API_KEY: MASTER_API_KEY
  
  # Notification services
  HEARTBEAT_WEBHOOK: HEARTBEAT_WEBHOOK
  PUSHOVER_API_KEY: PUSHOVER_API_KEY
  PUSHOVER_SOUND: PUSHOVER_SOUND


# Deployment rules for production environment
#
# OPTION 1: Deploy on GitHub releases (not pre-releases)
# When you create a release, deployment is triggered automatically
# Pre-releases are ignored for production safety
deploy_rules:
  - environment: prod
    release:
      types:
        - published
      exclude_prerelease: true

